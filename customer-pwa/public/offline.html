<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MediCall Care - Offline</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #f8fafc;
        color: #0f172a;
        font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        text-align: center;
        padding: 24px;
      }
      .card {
        max-width: 26rem;
      }
      .badge {
        width: 72px;
        height: 72px;
        border-radius: 9999px;
        background: #ccfbf1;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto 16px;
        font-size: 32px;
      }
      h1 {
        font-size: 1.5rem;
        margin: 0 0 8px;
      }
      p {
        color: #64748b;
        line-height: 1.5;
        margin: 0 0 20px;
      }
      button {
        background: #0f766e;
        color: white;
        border: none;
        border-radius: 12px;
        padding: 12px 20px;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
      }
      button:hover {
        background: #115e59;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="badge">📶</div>
      <h1>You're offline</h1>
      <p>
        MediCall Care can't reach the network right now. Once you're back online you can browse products,
        check out and track your deliveries again.
      </p>
      <button onclick="window.location.reload()">Try again</button>
    </div>
  </body>
</html>
